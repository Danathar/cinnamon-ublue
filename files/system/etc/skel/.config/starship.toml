"$schema" = "https://starship.rs/config-schema.json"

# Per-user Starship config template copied into new accounts from /etc/skel.
# This ensures new users get a local config immediately at first login.
add_newline = true

[custom.update]
# Show a prompt hint when a newer deployment is staged but not booted yet.
# Kept in skel so new users get this behavior without manual setup.
when = "/usr/bin/rpm-ostree status --json | /usr/bin/jq -e \".deployments[0].booted == false\" > /dev/null;"
command = "echo \"New deployment staged\""
symbol = "!"
format = " $symbol [($output)]($style) "
style = "italic green"
