"$schema" = "https://starship.rs/config-schema.json"

# System-wide fallback Starship config.
# Used only when a user does not already have ~/.config/starship.toml.
add_newline = true

[custom.update]
# Show a prompt hint when a newer deployment is staged but not booted yet.
# This mirrors the update visibility behavior users expect from ublue images.
when = "/usr/bin/rpm-ostree status --json | /usr/bin/jq -e \".deployments[0].booted == false\" > /dev/null;"
command = "echo \"New deployment staged\""
symbol = "!"
format = " $symbol [($output)]($style) "
style = "italic green"
