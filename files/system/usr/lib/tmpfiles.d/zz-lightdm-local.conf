# Ensure LightDM runtime/state directories exist with correct ownership.
d /var/cache/lightdm 0755 lightdm lightdm -
d /var/lib/lightdm 0755 lightdm lightdm -
d /var/lib/lightdm-data 0755 lightdm lightdm -
d /var/lib/lightdm-data/lightdm 0755 lightdm lightdm -
# Fix missing directories seen on some installs/services.
d /var/spool/at 0700 root root -
d /var/lib/plocate 0755 root root -
